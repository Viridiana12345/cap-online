{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta | Centro de Atención Psicológica</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{--p:#004d61;--s:#006b7d;--bg:#e8eff4;--bd:#d1dce6;--t:#1a2332;--m:#4a5568;--sh:0 20px 60px rgba(0,77,97,.12)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Work Sans',sans-serif;background:linear-gradient(165deg,#f4f7f9 0%,var(--bg) 100%);min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{width:min(620px,100%);background:#fff;border:1px solid var(--bd);border-radius:14px;box-shadow:var(--sh);padding:36px}
    .logo{width:74px;height:74px;border-radius:14px;background:var(--p);display:grid;place-items:center;margin:0 auto 16px;color:#fff;font-size:44px;font-weight:900}
    h1{font-family:'Crimson Pro',serif;text-align:center;color:var(--p);font-size:34px;margin-bottom:6px}
    .sub{text-align:center;color:var(--m);margin-bottom:22px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    label{display:block;font-weight:800;color:var(--t);margin:14px 0 6px}
    input{width:100%;padding:14px 14px;border:1px solid var(--bd);border-radius:10px;font-size:16px;outline:none}
    input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(0,77,97,.10)}
    .btn{width:100%;padding:14px;border:0;border-radius:10px;background:var(--p);color:#fff;font-weight:900;letter-spacing:.04em;text-transform:uppercase;font-size:15px;cursor:pointer;margin-top:18px}
    .btn:hover{background:var(--s)}
    .bottom{text-align:center;margin-top:18px;color:var(--m)}
    .bottom a{color:var(--p);font-weight:900;text-decoration:none}
    .msg{margin-top:12px;color:#b00020;font-weight:800}
    @media (max-width:640px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Ψ</div>
    <h1>Crear cuenta</h1>
    <p class="sub">Regístrate para acceder al Portal de Pacientes</p>

    {% if messages %}
      {% for message in messages %}
        <div class="msg">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'signup' %}">
      {% csrf_token %}

      <label for="full_name">Nombre completo</label>
      <input id="full_name" name="full_name" placeholder="Ej. Viridiana Hernández Bautista" required>

      <div class="grid">
        <div>
          <label for="telefono">Teléfono (opcional)</label>
          <input id="telefono" name="telefono" placeholder="Ej. +52 81 0000 0000">
        </div>
        <div>
          <label for="biografia">Biografía (opcional)</label>
          <input id="biografia" name="biografia" placeholder="Ej. Busco terapia para ansiedad...">
        </div>
      </div>

      <label for="email">Correo Electrónico</label>
      <input id="email" name="email" type="email" placeholder="correo@ejemplo.com" required>

      <div class="grid">
        <div>
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" required>
        </div>

        <div>
          <label for="password2">Confirmar contraseña</label>
          <input id="password2" name="password2" type="password" required>
        </div>
      </div>

      <button class="btn" type="submit">Crear cuenta</button>
    </form>

    <p class="bottom">¿Ya tiene cuenta? <a href="{% url 'login' %}">Iniciar sesión</a></p>
  </div>
</body>
</html>
