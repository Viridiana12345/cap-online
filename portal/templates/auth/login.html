{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Centro de Atención Psicológica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-primary: #004d61;
      --color-secondary: #006b7d;
      --color-teal-bg: #1a5f6e;
      --color-light: #f4f7f9;
      --color-white: #ffffff;
      --color-text: #1a2332;
      --color-text-light: #4a5568;
      --color-border: #d1dce6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Work Sans', sans-serif;
      line-height: 1.7;
      color: var(--color-text);
      background: linear-gradient(135deg, #1a5f6e 0%, #0d4a57 40%, #0a3d4a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1, h2, h3 { font-family: 'Crimson Pro', serif; font-weight: 600; line-height: 1.2; }

    .wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      background: var(--color-primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2rem;
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      margin: 0 auto 1.2rem;
    }

    .card-title {
      font-size: 1.9rem;
      color: var(--color-primary);
      margin-bottom: 0.3rem;
    }

    .card-subtitle {
      font-size: 0.95rem;
      color: var(--color-text-light);
      margin-bottom: 2rem;
    }

    .field {
      margin-top: 1.2rem;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      color: var(--color-text);
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      font-size: 1rem;
      font-family: 'Work Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: var(--color-text);
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder,
    input[type="email"]::placeholder {
      color: #aab4be;
    }

    input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(0, 77, 97, 0.10);
    }

    .extras {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--color-text-light);
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--color-primary);
      cursor: pointer;
    }

    .forgot-link {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-primary {
      display: block;
      width: 100%;
      background: var(--color-primary);
      color: #fff;
      padding: 1rem;
      border: none;
      border-radius: 6px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 1.5rem;
    }

    .btn-primary:hover {
      background: var(--color-secondary);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0, 77, 97, 0.25);
    }

    .register-link {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--color-text-light);
    }

    .register-link a {
      color: var(--color-primary);
      font-weight: 700;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .msg {
      margin-top: 1rem;
      color: #b00020;
      font-weight: 600;
      font-size: 0.9rem;
      text-align: left;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="logo-icon">Ψ</div>
    <h2 class="card-title">Centro de Atención<br>Psicológica</h2>
    <p class="card-subtitle">Acceso al Portal de Pacientes</p>

    {% if messages %}
      {% for message in messages %}
        <div class="msg">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" style="text-align:left;">
      {% csrf_token %}

<div class="field">
  <label for="email">Correo Electrónico</label>
  <input id="email" name="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email" required>
</div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="extras">
        <label class="remember">
          <input type="checkbox" name="remember"> Recordarme
        </label>
        <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
      </div>

      <button class="btn-primary" type="submit">Iniciar Sesión</button>
    </form>

    <p class="register-link">¿No tiene cuenta? <a href="{% url 'signup' %}">Registrarse aquí</a></p>
  </div>
</div>

</body>
</html>
